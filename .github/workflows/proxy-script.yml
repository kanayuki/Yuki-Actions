name: Update Proxy Dataset

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  update-proxy-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout main
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Load previous data from data branch
      run: |
        if git ls-remote --exit-code origin data &>/dev/null; then
          git fetch origin data
          mkdir -p proxy/merge proxy/dataset/raw proxy/country proxy/bin
          # Pipeline 1 (pac + merge) state
          git show origin/data:proxy/share_links.txt                          > proxy/share_links.txt                          2>/dev/null || true
          git show origin/data:proxy/share_link_keys.txt                      > proxy/share_link_keys.txt                      2>/dev/null || true
          git show origin/data:proxy/share_link_health.json                   > proxy/share_link_health.json                   2>/dev/null || true
          git show origin/data:proxy/merge/merge_share_links_filter.txt       > proxy/merge/merge_share_links_filter.txt       2>/dev/null || true
          # Dataset crawler state
          git show origin/data:proxy/dataset/health.json                      > proxy/dataset/health.json                      2>/dev/null || true
          git show origin/data:proxy/dataset/repo_scores.json                 > proxy/dataset/repo_scores.json                 2>/dev/null || true
          git show origin/data:proxy/dataset/alive.txt                        > proxy/dataset/alive.txt                        2>/dev/null || true
          git show origin/data:proxy/dataset/best_remote.txt                  > proxy/dataset/best_remote.txt                  2>/dev/null || true
          for f in $(git ls-tree --name-only origin/data -- proxy/dataset/raw/ 2>/dev/null); do
            mkdir -p "$(dirname "$f")"
            git show "origin/data:$f" > "$f" 2>/dev/null || true
          done
          git show origin/data:proxy/repositories.txt                         > proxy/repositories.txt                         2>/dev/null || true
          # Country files
          for f in $(git ls-tree --name-only origin/data -- proxy/country/ 2>/dev/null); do
            git show "origin/data:$f" > "$f" 2>/dev/null || true
          done
          # Binaries
          for f in $(git ls-tree --name-only origin/data -- proxy/bin/ 2>/dev/null); do
            git show "origin/data:$f" > "$f" 2>/dev/null || true
            chmod +x "$f" 2>/dev/null || true
          done
        fi

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: pip install -r requirements.txt

    # ── Dataset crawler stages (each independent, failures don't block others) ──

    - name: 'Dataset: discover'
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: cd proxy && python -m best discover

    - name: 'Dataset: collect'
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: cd proxy && python -m best collect

    - name: 'Dataset: alive check (every 12h)'
      continue-on-error: true
      run: |
        HOUR=$(date -u +%H)
        if [ "$HOUR" = "00" ] || [ "$HOUR" = "12" ]; then
          cd proxy && python -m best alive
        else
          echo "Skipped (not 00/12 UTC)"
        fi

    - name: 'Dataset: best-remote'
      continue-on-error: true
      run: cd proxy && python -m best best-remote

    - name: 'Dataset: rank'
      continue-on-error: true
      run: cd proxy && python -m best rank

    - name: 'Dataset: maintain (weekly Sunday)'
      continue-on-error: true
      run: |
        HOUR=$(date -u +%H)
        DAY=$(date -u +%u)
        if [ "$HOUR" = "00" ] && [ "$DAY" = "7" ]; then
          cd proxy && python -m best maintain
        else
          echo "Skipped (not Sunday 00 UTC)"
        fi

    # ── Pipeline 1: pac + merge (every 12h, independent of dataset crawler) ──

    - name: 'Pipeline 1: pac + merge (every 12h)'
      continue-on-error: true
      run: |
        HOUR=$(date -u +%H)
        if [ "$HOUR" = "00" ] || [ "$HOUR" = "12" ]; then
          cd proxy && python main.py
        else
          echo "Skipped (not 00/12 UTC)"
        fi

    # ── Publish: always runs, saves whatever data was produced ──

    - name: Publish data to data branch
      if: always()
      run: |
        git config user.email "kanayuki@163.com"
        git config user.name "kanayuki"

        # Stage all generated files to a temp dir
        mkdir -p /tmp/pd/proxy/merge /tmp/pd/proxy/dataset/raw /tmp/pd/proxy/country /tmp/pd/proxy/bin

        # Pipeline 1 state
        [ -f proxy/share_links.txt ]                    && cp proxy/share_links.txt                    /tmp/pd/proxy/
        [ -f proxy/share_link_keys.txt ]                && cp proxy/share_link_keys.txt                /tmp/pd/proxy/
        [ -f proxy/share_link_health.json ]             && cp proxy/share_link_health.json             /tmp/pd/proxy/
        [ -f proxy/merge/merge_share_links_filter.txt ] && cp proxy/merge/merge_share_links_filter.txt /tmp/pd/proxy/merge/

        # Dataset state
        [ -f proxy/dataset/health.json ]       && cp proxy/dataset/health.json       /tmp/pd/proxy/dataset/
        [ -f proxy/dataset/repo_scores.json ]  && cp proxy/dataset/repo_scores.json  /tmp/pd/proxy/dataset/
        [ -f proxy/dataset/alive.txt ]         && cp proxy/dataset/alive.txt         /tmp/pd/proxy/dataset/
        [ -f proxy/dataset/best_remote.txt ]   && cp proxy/dataset/best_remote.txt   /tmp/pd/proxy/dataset/
        cp proxy/dataset/raw/*.txt /tmp/pd/proxy/dataset/raw/ 2>/dev/null || true

        # Other
        [ -f proxy/repositories.txt ] && cp proxy/repositories.txt /tmp/pd/proxy/
        cp proxy/country/*.txt /tmp/pd/proxy/country/ 2>/dev/null || true

        # Binaries
        [ -f proxy/bin/versions.json ] && cp proxy/bin/versions.json /tmp/pd/proxy/bin/
        for f in proxy/bin/xray proxy/bin/xray.exe proxy/bin/sing-box proxy/bin/sing-box.exe proxy/bin/mihomo proxy/bin/mihomo.exe; do
          [ -f "$f" ] && cp "$f" /tmp/pd/proxy/bin/
        done

        # Worktree for data branch
        if git show-ref --quiet refs/remotes/origin/data; then
          git worktree add /tmp/data-wt origin/data
        else
          git worktree add --orphan -b data /tmp/data-wt
        fi

        cd /tmp/data-wt
        mkdir -p proxy/merge proxy/dataset/raw proxy/country proxy/bin

        # Copy everything from staging
        cp -r /tmp/pd/proxy/* proxy/ 2>/dev/null || true

        git add -A
        git diff --cached --quiet && echo "No changes to commit" && exit 0
        git commit -m "data: $(date -u +'%Y-%m-%d %H:%M UTC')"
        git push origin HEAD:data
